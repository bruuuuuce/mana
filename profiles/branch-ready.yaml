name: branch-ready
trigger: before_pr
runner: codex
artifact_workspace:
  root: .mana
  routing: feature_or_session
  initialize_if_missing: true
  default_purpose: branch-validation
service_context:
  root: .mana/global
  core_files:
  - service-mission.md
  - architecture.md
  - engineering-guards.md
  optional_files:
  - domain-glossary.md
  - integration-map.md
  - testing-policy.md
  - database-policy.md
  missing_file_behavior: warn
  guard_violation_behavior: block_or_require_owner_approval
agents:
- branch-validation-agent
- liquibase-agent
skills:
- architecture-risk
- cross-service-contract
- database-drift
- developer-decision-review
- green-border-plan
- liquibase-production-risk
- liquibase-syntax
- pre-review-defect
- regression-selection
- rollback-safety
- source-impact-map
- technical-task-breakdown
- test-quality
blocking_conditions:
  - unresolved blocker findings
  - missing required artifacts
  - unsafe database, security, architecture, or cross-service risk without owner approval
warning_conditions:
  - medium-risk ambiguity with owner acknowledgement
  - incomplete optional evidence
  - MCP read limitation documented for follow-up
expected_max_duration: 20 minutes
human_approval_requirement: true
