name: pre-commit
trigger: pre_commit
runner: junie/local
artifact_workspace:
  root: .mana
  routing: feature_or_session
  initialize_if_missing: false
  default_purpose: local-hook
service_context:
  root: .mana/global
  core_files:
  - service-mission.md
  - architecture.md
  - engineering-guards.md
  optional_files:
  - domain-glossary.md
  - integration-map.md
  - testing-policy.md
  - database-policy.md
  missing_file_behavior: warn
  guard_violation_behavior: block_or_require_owner_approval
agents:
- git-hook-agent
- pre-commit-documentation-agent
skills:
- development-summary
- developer-decision-review
- developer-handoff
- green-border-plan
- knowledge-transfer-brief
- liquibase-production-risk
- liquibase-syntax
- null-safety-risk
- pre-review-defect
- unit-test-gap
blocking_conditions:
  - unresolved blocker findings
  - missing required artifacts
  - unsafe database, security, architecture, or cross-service risk without owner approval
warning_conditions:
  - medium-risk ambiguity with owner acknowledgement
  - incomplete optional evidence
  - MCP read limitation documented for follow-up
expected_max_duration: 8 minutes
human_approval_requirement: false
