name: pr-ready
trigger: pr_ready
runner: codex
artifact_workspace:
  root: .mana
  routing: feature_or_session
  initialize_if_missing: true
  default_purpose: pr-readiness
service_context:
  root: .mana/global
  core_files:
  - service-mission.md
  - architecture.md
  - engineering-guards.md
  optional_files:
  - domain-glossary.md
  - integration-map.md
  - testing-policy.md
  - database-policy.md
  missing_file_behavior: warn
  guard_violation_behavior: block_or_require_owner_approval
agents:
- pr-readiness-agent
skills:
- architecture-guard-detector
- architecture-risk
- changed-files-risk-classifier
- cross-service-contract
- dependency-security-evidence
- developer-decision-review
- developer-handoff
- development-summary
- jira-acceptance-criteria-normalizer
- liquibase-production-risk
- pre-review-defect
- sonar-evidence-triage
- test-quality
blocking_conditions:
  - unresolved blocker findings
  - missing required artifacts
  - unsafe database, security, architecture, or cross-service risk without owner approval
warning_conditions:
  - medium-risk ambiguity with owner acknowledgement
  - incomplete optional evidence
  - MCP read limitation documented for follow-up
expected_max_duration: 15 minutes
human_approval_requirement: true
